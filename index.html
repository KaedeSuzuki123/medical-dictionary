<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Japanese Dictionary | 医学用語辞典</title>
<style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --primary: #1a4a7c;
  --primary-dark: #0f2f52;
  --accent: #c1121f;
  --text: #1a1a2e;
  --muted: #6b7a8d;
  --border: #e0e4ea;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); }

header {
  background: linear-gradient(135deg, #1a4a7c 0%, #0f2f52 100%);
  color: white; padding: 1.4rem 1.5rem 1.3rem;
}
.header-top h1 { font-size: 1.45rem; font-weight: 700; }
.header-sub { font-size: 0.88rem; opacity: 0.75; margin-top: 0.15rem; font-family: 'Yu Gothic','Hiragino Kaku Gothic Pro',sans-serif; }
.search-wrap { max-width: 600px; margin: 1rem auto 0; position: relative; }
.search-wrap input {
  width: 100%; padding: 0.72rem 1rem 0.72rem 2.7rem;
  border-radius: 999px; border: none; font-size: 0.95rem;
  outline: none; box-shadow: 0 2px 12px rgba(0,0,0,0.18); font-family: inherit;
}
.search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #aaa; pointer-events: none; }

.stat-bar {
  display: flex; gap: 1.2rem; flex-wrap: wrap;
  padding: 0.5rem 1.5rem; background: var(--primary-dark);
  color: rgba(255,255,255,0.65); font-size: 0.78rem;
}
.stat-bar strong { color: white; }

.filter-bar {
  padding: 0.75rem 1rem; background: var(--card);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.cat-pill {
  display: inline-flex; flex-direction: column; align-items: center;
  padding: 0.3rem 0.85rem; border-radius: 999px;
  border: 1.5px solid var(--border); background: white; color: var(--muted);
  cursor: pointer; font-size: 0.8rem; margin-right: 0.4rem; font-weight: 500;
  transition: all 0.15s; white-space: nowrap; font-family: inherit; line-height: 1.25;
}
.cat-pill.active { color: white; border-color: transparent; }
.cat-pill-ja {
  font-size: 0.68em; font-family: 'Yu Gothic','Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;
  font-weight: 400; opacity: 0.8; letter-spacing: 0.02em;
}

main { max-width: 1140px; margin: 1.2rem auto; padding: 0 1rem 5rem; }
.results-count { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.8rem; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(275px, 1fr)); gap: 1rem; }
.no-results { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.95rem; grid-column: 1/-1; }

.term-card {
  background: var(--card); border-radius: 10px;
  padding: 1rem 1.1rem 0.9rem; box-shadow: var(--shadow);
  border-top: 4px solid #ccc; position: relative;
  transition: box-shadow 0.15s, transform 0.1s;
}
.term-card:hover { box-shadow: 0 5px 18px rgba(0,0,0,0.13); transform: translateY(-1px); }
.cat-badge {
  display: inline-flex; flex-direction: column; align-items: flex-start;
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.05em; color: white; padding: 0.18rem 0.6rem;
  border-radius: 999px; margin-bottom: 0.5rem; text-transform: uppercase; line-height: 1.3;
}
.cat-badge-ja {
  display: block; font-size: 0.78em; font-weight: 400; letter-spacing: 0.03em;
  font-family: 'Yu Gothic','Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;
  text-transform: none; opacity: 0.88;
}
.custom-tag { font-size: 0.68rem; color: #e9a000; font-weight: 700; margin-left: 0.3rem; }
.term-en { font-size: 1.12rem; font-weight: 700; color: var(--text); margin-bottom: 0.38rem; line-height: 1.25; }
.term-jp {
  font-family: 'Yu Gothic','Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;
  font-size: 1.22rem; color: var(--primary); line-height: 1.8; margin-bottom: 0.1rem;
}
ruby rt { font-size: 0.55em; color: var(--muted); line-height: 1; }
.term-katakana {
  font-family: 'Yu Gothic','Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;
  font-size: 0.9rem; color: #2a6496; margin-bottom: 0.1rem;
}
.term-romaji { font-size: 0.8rem; color: var(--muted); font-style: italic; margin-bottom: 0.5rem; }
.term-defs { border-top: 1px solid var(--border); padding-top: 0.5rem; margin-top: 0.3rem; display: flex; flex-direction: column; gap: 0.4rem; }
.term-card { cursor: pointer; }
.expand-hint { font-size: 0.72rem; color: var(--muted); margin-top: 0.5rem; text-align: center; letter-spacing: 0.02em; }
.collapse-hint { font-size: 0.72rem; color: var(--muted); text-align: center; margin-top: 0.6rem; display: none; }
.term-card.expanded .collapse-hint { display: block; }
.term-card.expanded .expand-hint { display: none; }
.expanded-view {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.32s ease, opacity 0.25s ease;
  opacity: 0;
  border-top: 1px solid transparent;
  margin-top: 0;
}
.term-card.expanded .expanded-view {
  max-height: 1200px;
  opacity: 1;
  border-top-color: var(--border);
  margin-top: 0.6rem;
  padding-top: 0.6rem;
}
.term-symptoms { margin-top: 0.45rem; padding-top: 0.45rem; border-top: 1px dashed #e8eaf0; }
.symptoms-label { display: inline-block; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; background: #f0f4ff; color: #3a5cb8; border-radius: 3px; padding: 0.1rem 0.4rem; margin-right: 0.4rem; vertical-align: middle; font-family: 'Yu Gothic','Hiragino Kaku Gothic Pro',sans-serif; }
.symptoms-text { font-size: 0.79rem; color: #4a5060; line-height: 1.6; font-family: 'Yu Gothic','Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif; }
.term-def-row { display: flex; gap: 0.45rem; align-items: flex-start; }
.def-lang {
  flex-shrink: 0; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em;
  padding: 0.1rem 0.35rem; border-radius: 3px; margin-top: 0.18rem;
  line-height: 1.3;
}
.def-lang.en { background: #e8f0fe; color: #1a4a7c; }
.def-lang.ja { background: #fff0f0; color: #b00020; font-family: 'Yu Gothic',sans-serif; }
.def-text { font-size: 0.81rem; color: #4a4a5a; line-height: 1.5; }
.def-text.ja-text { font-family: 'Yu Gothic','Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif; }

.delete-btn {
  position: absolute; top: 0.55rem; right: 0.6rem;
  background: none; border: none; color: #ddd;
  cursor: pointer; font-size: 0.9rem; padding: 0.15rem 0.3rem;
  border-radius: 4px; transition: all 0.1s;
}
.delete-btn:hover { color: var(--accent); background: #fef2f2; }

.add-fab {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: var(--accent); color: white;
  border: none; border-radius: 999px;
  padding: 0.72rem 1.35rem; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; z-index: 100;
  box-shadow: 0 4px 16px rgba(193,18,31,0.35);
  transition: background 0.15s, transform 0.1s; font-family: inherit;
}
.add-fab:hover { background: #a0101c; transform: translateY(-1px); }

.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 200;
  align-items: center; justify-content: center; padding: 1rem;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: 14px; padding: 1.6rem;
  width: 100%; max-width: 500px; max-height: 92vh;
  overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.22);
}
.modal h2 { font-size: 1.1rem; color: var(--primary-dark); margin-bottom: 1rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
.form-group { margin-bottom: 0.75rem; }
.form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 0.22rem; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 0.48rem 0.65rem;
  border: 1.5px solid var(--border); border-radius: 6px;
  font-size: 0.88rem; font-family: inherit; outline: none; transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-note { font-size: 0.72rem; color: var(--muted); margin-top: 0.18rem; }
.modal-footer { display: flex; gap: 0.6rem; margin-top: 1rem; justify-content: flex-end; }
.btn { padding: 0.5rem 1.1rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.88rem; font-weight: 600; font-family: inherit; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-ghost { background: none; border: 1.5px solid var(--border); color: var(--muted); }
.btn-ghost:hover { border-color: #aaa; color: var(--text); }

/* ── STUDY MODE ──────────────────────────────────────────────────────────── */
.study-fab {
  position: fixed; bottom: 4.5rem; right: 1.5rem;
  background: #1a4a7c; color: white;
  border: none; border-radius: 999px;
  padding: 0.72rem 1.35rem; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; z-index: 100;
  box-shadow: 0 4px 16px rgba(26,74,124,0.35);
  transition: background 0.15s, transform 0.1s; font-family: inherit;
}
.study-fab:hover { background: #0f2f52; transform: translateY(-1px); }

.study-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 300;
  align-items: center; justify-content: center; padding: 1rem;
}
.study-overlay.open { display: flex; }

.study-panel {
  background: white; border-radius: 16px;
  width: 100%; max-width: 520px;
  max-height: 95vh; overflow-y: auto;
  box-shadow: 0 12px 48px rgba(0,0,0,0.28);
}

.study-header {
  background: linear-gradient(135deg, #1a4a7c 0%, #0f2f52 100%);
  color: white; padding: 1rem 1.5rem;
  border-radius: 16px 16px 0 0;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 1;
}
.study-header h2 { font-size: 1.05rem; font-weight: 700; }
.study-close {
  background: none; border: none; color: white;
  font-size: 1.2rem; cursor: pointer; opacity: 0.8;
  padding: 0.25rem 0.5rem; border-radius: 4px; line-height: 1; font-family: inherit;
}
.study-close:hover { opacity: 1; background: rgba(255,255,255,0.15); }

/* Setup */
.study-body { padding: 1.3rem 1.5rem; }

.study-mode-select {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
  margin-bottom: 1.1rem;
}
.mode-card {
  border: 2px solid var(--border); border-radius: 10px;
  padding: 0.9rem 0.75rem; cursor: pointer; text-align: center;
  transition: all 0.15s; background: white; font-family: inherit;
  width: 100%;
}
.mode-card:hover { border-color: var(--primary); }
.mode-card.selected { border-color: var(--primary); background: #f0f4ff; }
.mode-card-icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
.mode-card-name { font-weight: 700; font-size: 0.88rem; color: var(--text); }
.mode-card-desc { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; }

.study-option-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.65rem;
  margin-bottom: 1rem;
}
.study-option label {
  display: block; font-size: 0.75rem; font-weight: 600;
  color: var(--muted); margin-bottom: 0.25rem;
}
.study-option select {
  width: 100%; padding: 0.44rem 0.6rem;
  border: 1.5px solid var(--border); border-radius: 6px;
  font-size: 0.82rem; font-family: inherit; outline: none;
  background: white; cursor: pointer;
}
.study-option select:focus { border-color: var(--primary); }

.study-start-btn {
  width: 100%; padding: 0.7rem;
  background: var(--primary); color: white;
  border: none; border-radius: 8px;
  font-size: 0.95rem; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background 0.15s;
}
.study-start-btn:hover { background: var(--primary-dark); }

/* Flashcard */
.flashcard-container { display: none; padding: 1.2rem 1.5rem; }
.flashcard-container.active { display: block; }

.flashcard-progress {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem; font-size: 0.8rem; color: var(--muted);
}
.fc-progress-bar {
  flex: 1; height: 4px; background: #e8eaf0;
  border-radius: 999px; margin: 0 0.75rem; overflow: hidden;
}
.fc-progress-fill {
  height: 100%; background: var(--primary);
  border-radius: 999px; transition: width 0.35s;
}
.fc-shuffle-btn {
  padding: 0.28rem 0.65rem; border-radius: 6px;
  border: 1.5px solid var(--border); background: white;
  font-size: 0.75rem; cursor: pointer; color: var(--muted);
  font-family: inherit; transition: all 0.15s; white-space: nowrap;
}
.fc-shuffle-btn:hover { border-color: var(--primary); color: var(--primary); }

.flashcard-scene {
  width: 100%; perspective: 1000px;
  margin-bottom: 0.9rem; height: 230px;
}
.flashcard {
  width: 100%; height: 230px;
  position: relative; transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  cursor: pointer;
}
.flashcard.flipped { transform: rotateY(180deg); }

.fc-face {
  position: absolute; inset: 0;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.1rem 1.3rem; text-align: center;
  border: 2px solid var(--border);
  box-shadow: 0 4px 16px rgba(0,0,0,0.08); overflow-y: auto;
}
.fc-front { background: linear-gradient(135deg, #f8faff 0%, #eef2ff 100%); }
.fc-back  { background: linear-gradient(135deg, #fff8f8 0%, #fff0f0 100%); transform: rotateY(180deg); }

.fc-label {
  font-size: 0.63rem; font-weight: 700; letter-spacing: 0.08em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 0.45rem;
}
.fc-main-text { font-size: 1.25rem; font-weight: 700; color: var(--text); line-height: 1.3; }
.fc-jp-text {
  font-family: 'Yu Gothic','Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;
  font-size: 1.45rem; color: var(--primary); line-height: 1.8;
}
.fc-jp-text ruby rt { font-size: 0.5em; color: var(--muted); }
.fc-romaji { font-size: 0.8rem; color: var(--muted); font-style: italic; margin-top: 0.15rem; }
.fc-def {
  font-size: 0.74rem; color: #4a4a5a; line-height: 1.45;
  border-top: 1px solid rgba(0,0,0,0.07); padding-top: 0.45rem; margin-top: 0.45rem;
  font-family: 'Yu Gothic','Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;
}
.fc-hint { font-size: 0.68rem; color: #ccc; margin-top: 0.55rem; }

.fc-self-assess {
  display: none; gap: 0.6rem; margin-bottom: 0.8rem; justify-content: center;
}
.fc-self-assess.visible { display: flex; }
.fc-assess-btn {
  padding: 0.4rem 1rem; border-radius: 6px; border: none;
  font-size: 0.85rem; font-weight: 700; cursor: pointer; font-family: inherit;
}
.fc-assess-btn.knew   { background: #d1fae5; color: #065f46; }
.fc-assess-btn.knew:hover   { background: #a7f3d0; }
.fc-assess-btn.forgot { background: #fee2e2; color: #991b1b; }
.fc-assess-btn.forgot:hover { background: #fecaca; }

.fc-nav {
  display: flex; align-items: center; justify-content: space-between;
  gap: 0.5rem; margin-bottom: 0.45rem;
}
.fc-nav-btn {
  padding: 0.44rem 1rem; border-radius: 8px;
  border: 1.5px solid var(--border); background: white;
  color: var(--text); font-size: 0.84rem; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.fc-nav-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
.fc-nav-btn:disabled { opacity: 0.3; cursor: default; }
.fc-score-info { text-align: center; font-size: 0.75rem; color: var(--muted); }

/* Quiz */
.quiz-container { display: none; padding: 1.2rem 1.5rem; }
.quiz-container.active { display: block; }

.quiz-progress {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem; font-size: 0.8rem; color: var(--muted);
}
.qz-score-display { font-weight: 700; color: var(--primary); white-space: nowrap; }
.qz-progress-bar {
  flex: 1; height: 4px; background: #e8eaf0;
  border-radius: 999px; margin: 0 0.75rem; overflow: hidden;
}
.qz-progress-fill {
  height: 100%; background: #22c55e;
  border-radius: 999px; transition: width 0.35s;
}

.quiz-question-card {
  background: linear-gradient(135deg, #f8faff 0%, #eef2ff 100%);
  border: 2px solid var(--border); border-radius: 12px;
  padding: 1.1rem; text-align: center; margin-bottom: 0.9rem;
}
.qz-dir-label {
  font-size: 0.63rem; font-weight: 700; letter-spacing: 0.08em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 0.45rem;
}
.qz-question-text {
  font-size: 1.2rem; font-weight: 700; color: var(--text); line-height: 1.3;
}
.qz-question-text.jp {
  font-family: 'Yu Gothic','Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif;
  font-size: 1.4rem; color: var(--primary);
}
.qz-question-text ruby rt { font-size: 0.5em; color: var(--muted); }
.qz-question-sub { font-size: 0.76rem; color: var(--muted); margin-top: 0.3rem; font-style: italic; }

.quiz-choices { display: grid; gap: 0.48rem; margin-bottom: 0.75rem; }
.qz-choice {
  width: 100%; padding: 0.62rem 1rem;
  border: 2px solid var(--border); border-radius: 8px;
  background: white; color: var(--text);
  font-size: 0.88rem; font-weight: 500; text-align: left;
  cursor: pointer; font-family: inherit;
  transition: border-color 0.12s, background 0.12s; line-height: 1.4;
}
.qz-choice:hover:not(:disabled) { border-color: var(--primary); background: #f0f4ff; }
.qz-choice:disabled { cursor: default; }
.qz-choice.correct  { border-color: #22c55e !important; background: #f0fdf4 !important; color: #15803d !important; font-weight: 700; }
.qz-choice.wrong    { border-color: #ef4444 !important; background: #fef2f2 !important; color: #dc2626 !important; }
.qz-choice.revealed { border-color: #22c55e !important; background: #f0fdf4 !important; color: #15803d !important; font-weight: 700; }

.qz-feedback {
  min-height: 1.3rem; text-align: center;
  font-size: 0.85rem; font-weight: 700; margin-bottom: 0.5rem;
}
.qz-feedback.correct { color: #15803d; }
.qz-feedback.wrong   { color: #dc2626; }

.qz-next-btn {
  width: 100%; padding: 0.62rem;
  background: var(--primary); color: white;
  border: none; border-radius: 8px;
  font-size: 0.9rem; font-weight: 700;
  cursor: pointer; font-family: inherit;
  display: none; transition: background 0.15s;
}
.qz-next-btn.visible { display: block; }
.qz-next-btn:hover { background: var(--primary-dark); }

/* Results */
.results-container { display: none; padding: 2rem 1.5rem; text-align: center; }
.results-container.active { display: block; }
.results-icon  { font-size: 2.8rem; margin-bottom: 0.45rem; }
.results-title { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 0.2rem; }
.results-score { font-size: 2.4rem; font-weight: 700; color: var(--primary); margin-bottom: 0.25rem; }
.results-sub   { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.2rem; line-height: 1.55; }
.results-actions { display: flex; gap: 0.6rem; justify-content: center; }
.results-btn {
  padding: 0.52rem 1.3rem; border-radius: 8px;
  font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: inherit;
}
.results-btn.primary { background: var(--primary); color: white; border: none; }
.results-btn.primary:hover { background: var(--primary-dark); }
.results-btn.ghost { background: white; color: var(--muted); border: 1.5px solid var(--border); }
.results-btn.ghost:hover { border-color: #aaa; color: var(--text); }

.study-focus-row {
  display: flex; gap: 0.45rem; margin-bottom: 1rem;
}
.focus-pill {
  flex: 1; padding: 0.4rem 0.4rem;
  border: 1.5px solid var(--border); border-radius: 6px;
  background: white; color: var(--muted);
  font-size: 0.76rem; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all 0.15s; text-align: center;
}
.focus-pill:hover { border-color: var(--primary); color: var(--primary); }
.focus-pill.active { border-color: var(--primary); background: var(--primary); color: white; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🏥 Medical Japanese Dictionary</h1>
    <div class="header-sub">医学用語辞典 &nbsp;—&nbsp; 英語・日本語</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">

      <div class="form-row">

          <label>Romaji</label>
          <input name="romaji" placeholder="e.g. shinfuzen">

          <label>Katakana</label>
          <input name="katakana" placeholder="e.g. アレルギー" style="font-family:'Yu Gothic',sans-serif;">

      </div>
      <div class="form-group">
        <label>Category *</label>
        <select name="cat" required>
          <option value="">— select specialty —</option>
          <option>Cardiology</option><option>Neurology</option><option>Pulmonology</option>

          <option>Hematology</option><option>Infectious Disease</option><option>OB / GYN</option>
          <option>Psychiatry</option><option>Pharmacology</option><option>Ophthalmology</option>

      </div>
      <div class="form-group">
        <label>English Definition</label>
        <textarea name="def" placeholder="Short description in English…"></textarea>
      </div>
      <div class="form-group">
        <label>Japanese Description &nbsp;<span style="font-family:'Yu Gothic',sans-serif;font-size:0.85rem;">（日本語の説明）</span></label>
        <textarea name="defJa" placeholder="日本語の説明…" style="font-family:'Yu Gothic','Hiragino Kaku Gothic Pro',sans-serif;"></textarea>
      </div>
      <div class="form-group">
        <label>症状・徴候 / 臨床メモ</label>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Term</button>
      </div>
    </form>
  </div>
</div>

/* ── STATE ─────────────────────────────────────────────────────────────────── */
let searchQuery = "";
let activeCategory = "All";
let customTerms = loadCustomTerms();
let nextId = 2000;

/* ── PERSISTENCE ───────────────────────────────────────────────────────────── */
function loadCustomTerms() {
  try { return JSON.parse(localStorage.getItem("medDictCustom")) || []; }
  catch { return []; }
}
function saveCustomTerms() {
  localStorage.setItem("medDictCustom", JSON.stringify(customTerms));
}

/* ── DATA HELPERS ──────────────────────────────────────────────────────────── */
function getAllTerms() { return [...BUILT_IN, ...customTerms]; }

function getCategories() {
  const order = ["All", ...Object.keys(CAT_COLORS)];
  const used = new Set(getAllTerms().map(t => t.cat));
  return order.filter(c => c === "All" || used.has(c));
}

function getFilteredTerms() {
  const q = searchQuery.toLowerCase().trim();
  return getAllTerms().filter(t => {
    if (activeCategory !== "All" && t.cat !== activeCategory) return false;
    if (!q) return true;
    return (
      t.en.toLowerCase().includes(q) ||
      (t.kanji    && t.kanji.includes(q))   ||
      (t.reading  && t.reading.includes(q)) ||
      (t.romaji   && t.romaji.toLowerCase().includes(q)) ||
      (t.katakana && t.katakana.includes(q)) ||
      (t.def      && t.def.toLowerCase().includes(q)) ||
      (t.defJa    && t.defJa.includes(q))
    );
  });
}

/* ── RENDER ────────────────────────────────────────────────────────────────── */
function renderStatBar() {
  const total = BUILT_IN.length + customTerms.length;
  const cats  = getCategories().length - 1;
  document.getElementById("statBar").innerHTML =
    `<strong>${total}</strong> terms &nbsp;·&nbsp; <strong>${cats}</strong> specialties &nbsp;·&nbsp; <strong>${customTerms.length}</strong> added by you`;
}

function renderFilterBar() {
  const cats = getCategories();
  document.getElementById("filterBar").innerHTML = cats.map(c => {
    const color    = c === "All" ? "#555" : (CAT_COLORS[c] || "#888");
    const isActive = c === activeCategory;
    const style    = isActive
      ? `background:${color};border-color:${color};`
      : `border-color:${color}40;color:${color};`;
    const ja = CAT_JA[c] || "";
    return `<button class="cat-pill${isActive ? " active" : ""}" style="${style}" onclick="setCategory('${c}')">${c}${ja ? `<span class="cat-pill-ja">${ja}</span>` : ""}</button>`;
  }).join("");
}

function rubyHtml(kanji, reading) {
  if (!kanji) return "";
  if (!reading || kanji === reading) return kanji;
  return `<ruby>${kanji}<rt>${reading}</rt></ruby>`;
}

function toggleCard(el, e) {
  if (e && e.target.classList.contains('delete-btn')) return;
  el.classList.toggle('expanded');
}

function renderCard(t) {
  const color     = CAT_COLORS[t.cat] || "#888";
  const delBtn    = t.custom
    ? `<button class="delete-btn" title="削除" onclick="event.stopPropagation();deleteTerm(${t.id})">✕</button>`
    : "";
  const customTag = t.custom ? `<span class="custom-tag">★ 追加済み</span>` : "";

  // ── Always visible (compact) ──────────────────────────────────────────────
  const jpHtml = (t.kanji || t.reading)
    ? `<div class="term-jp">${rubyHtml(t.kanji, t.reading)}</div>` : "";

  // ── Expanded only ─────────────────────────────────────────────────────────
  const kataHtml = (t.katakana && t.katakana !== t.kanji)
    ? `<div class="term-katakana">${t.katakana}</div>` : "";
  const romaHtml = t.romaji
    ? `<div class="term-romaji">${t.romaji}</div>` : "";

  // Japanese first, English secondary
  const defRows = [];
  if (t.defJa) defRows.push(`<div class="term-def-row"><span class="def-lang ja">日</span><span class="def-text ja-text">${t.defJa}</span></div>`);
  if (t.def)   defRows.push(`<div class="term-def-row"><span class="def-lang en">EN</span><span class="def-text">${t.def}</span></div>`);
  const defsHtml = defRows.length ? `<div class="term-defs">${defRows.join("")}</div>` : "";

  const sympText = SYMPTOMS_JA_MAP[t.id] || t.symptoms || null;
  const sympHtml = sympText
    ? `<div class="term-symptoms"><span class="symptoms-label">症状・徴候</span><span class="symptoms-text">${sympText}</span></div>`
    : "";

  return `
    <div class="term-card" style="border-top-color:${color};" onclick="toggleCard(this,event)">
      ${delBtn}
      <span class="cat-badge" style="background:${color};">${t.cat}${CAT_JA[t.cat] ? `<span class="cat-badge-ja">${CAT_JA[t.cat]}</span>` : ""}</span>${customTag}
      <div class="term-en">${t.en}</div>
      ${jpHtml}
      <div class="expand-hint">▾ タップして詳細を表示</div>
      <div class="expanded-view">
        ${kataHtml}${romaHtml}${defsHtml}${sympHtml}
      </div>
      <div class="collapse-hint">▴ 閉じる</div>
    </div>`;
}

function renderCards() {
  const filtered = getFilteredTerms();
  const total    = getAllTerms().length;
  document.getElementById("resultsCount").textContent =
    `Showing ${filtered.length} of ${total} terms`;
  document.getElementById("cardsGrid").innerHTML = filtered.length
    ? filtered.map(renderCard).join("")
    : `<div class="no-results">No terms found for "<strong>${searchQuery}</strong>".<br>Try a different spelling or <button onclick="openModal()" style="background:none;border:none;color:var(--primary);cursor:pointer;font-size:inherit;text-decoration:underline;">add it yourself</button>.</div>`;
}

function render() {
  renderStatBar();
  renderFilterBar();
  renderCards();
}

/* ── INTERACTIONS ──────────────────────────────────────────────────────────── */
function onSearch(val)    { searchQuery = val; renderCards(); }
function setCategory(cat) { activeCategory = cat; render(); }
function deleteTerm(id) {
  if (!confirm("Delete this custom term?")) return;
  customTerms = customTerms.filter(t => t.id !== id);
  saveCustomTerms();
  render();
}

/* ── MODAL ─────────────────────────────────────────────────────────────────── */
function openModal()  { document.getElementById("modalOverlay").classList.add("open"); }
function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.getElementById("addForm").reset();
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModal();
}
function submitTerm(e) {
  e.preventDefault();
  const d = new FormData(e.target);
  customTerms.push({
    id:       nextId++,
    en:       d.get("en").trim(),
    kanji:    d.get("kanji").trim()    || null,
    reading:  d.get("reading").trim()  || null,
    romaji:   d.get("romaji").trim()   || null,
    katakana: d.get("katakana").trim() || null,
    def:      d.get("def").trim()      || null,
    defJa:    d.get("defJa").trim()    || null,
    symptoms: d.get("symptoms").trim() || null,
    cat:      d.get("cat"),
    custom:   true,
  });
  saveCustomTerms();
  closeModal();
  render();
}

function selectStudyFocus(focus) {
  studyFocus = focus;
  document.querySelectorAll(".focus-pill").forEach(el => el.classList.remove("active"));
  document.querySelector(`.focus-pill[data-focus="${focus}"]`).classList.add("active");
  updateFocusUI();
}

function updateFocusUI() {
  document.getElementById("studyDirRow").style.display = studyFocus === "treatment" ? "none" : "";
}

function startStudy() {
  studyDir = document.getElementById("studyDirSelect").value;
  studyCat = document.getElementById("studyCatSelect").value;
  const countVal = document.getElementById("studyCountSelect").value;

  const pool = getAllTerms().filter(t => {
    if (studyCat !== "All" && t.cat !== studyCat) return false;
    if (studyFocus === "vocabulary") return !!(t.kanji || t.reading);
    if (studyFocus === "symptoms")   return SYMPTOMS_MAP[t.id] != null;
    if (studyFocus === "treatment")  return TREATMENT_MAP[t.id] != null;
    return false;
  });

  const minNeeded = studyMode === "quiz" ? 4 : 1;
  if (pool.length < minNeeded) {
    alert(`Need at least ${minNeeded} terms with ${studyFocus} data in this category. Try "All" or a broader specialty.`);
    return;
  }

  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  const count    = countVal === "all" ? shuffled.length : Math.min(parseInt(countVal), shuffled.length);
  studyTerms = shuffled.slice(0, count);
  studyIndex = 0;

  document.getElementById("studySetup").style.display = "none";

  if (studyMode === "flashcard") {
    fcKnew = 0; fcForgot = 0;
    document.getElementById("fcContainer").classList.add("active");
    document.getElementById("studyHeader").querySelector("h2").textContent =
      studyFocus === "symptoms" ? "Symptoms Flashcards" :
      studyFocus === "treatment" ? "Treatment Flashcards" : "Flashcards";
    renderFlashcard();
  } else {
    qzScore = 0; qzAnswered = 0;
    document.getElementById("qzContainer").classList.add("active");
    document.getElementById("studyHeader").querySelector("h2").textContent =
      studyFocus === "symptoms" ? "Symptoms Quiz" :
      studyFocus === "treatment" ? "Treatment Quiz" : "Vocabulary Quiz";
    renderQuizQuestion();
  }
}

/* ── FLASHCARD ───────────────────────────────────────────────────────────── */
function renderFlashcard() {
  const t      = studyTerms[studyIndex];
  const total  = studyTerms.length;
  const isEnJa = studyDir === "en-ja";

  fcFlipped = false;
  document.getElementById("fcCard").classList.remove("flipped");

  document.getElementById("fcProgressText").textContent = `${studyIndex + 1} / ${total}`;
  document.getElementById("fcProgressFill").style.width = `${((studyIndex + 1) / total) * 100}%`;

  const jpHtml = (t.kanji && t.reading && t.kanji !== t.reading)
    ? `<ruby>${t.kanji}<rt>${t.reading}</rt></ruby>`
    : (t.kanji || t.reading || "—");

  // Reset any inline style overrides from previous card
  const backMain = document.getElementById("fcBackMain");
  const backDef  = document.getElementById("fcBackDef");
  backMain.style.fontSize = backMain.style.fontWeight = "";
  backDef.style.borderTop = backDef.style.paddingTop = backDef.style.marginTop = "";

  if (studyFocus === "vocabulary") {
    if (isEnJa) {
      document.getElementById("fcFrontLabel").textContent = "English";
      document.getElementById("fcFrontMain").className    = "fc-main-text";
      document.getElementById("fcFrontMain").textContent  = t.en;
      document.getElementById("fcFrontSub").textContent   = "";
      document.getElementById("fcBackLabel").textContent  = "Japanese";
      backMain.className    = "fc-main-text fc-jp-text";
      backMain.innerHTML    = jpHtml;
      document.getElementById("fcBackRomaji").textContent = t.romaji || "";
      backDef.textContent   = t.defJa || t.def || "";
    } else {
      document.getElementById("fcFrontLabel").textContent = "Japanese";
      document.getElementById("fcFrontMain").className    = "fc-main-text fc-jp-text";
      document.getElementById("fcFrontMain").innerHTML    = jpHtml;
      document.getElementById("fcFrontSub").textContent   = t.romaji || "";
      document.getElementById("fcBackLabel").textContent  = "English";
      backMain.className    = "fc-main-text";
      backMain.textContent  = t.en;
      document.getElementById("fcBackRomaji").textContent = "";
      backDef.textContent   = t.def || "";
    }

  } else if (studyFocus === "symptoms") {
    const sympText = (!isEnJa && SYMPTOMS_JA_MAP[t.id])
      ? SYMPTOMS_JA_MAP[t.id]
      : (SYMPTOMS_MAP[t.id] || "—");
    if (isEnJa) {
      document.getElementById("fcFrontLabel").textContent = "Condition";
      document.getElementById("fcFrontMain").className    = "fc-main-text";
      document.getElementById("fcFrontMain").textContent  = t.en;
      document.getElementById("fcFrontSub").textContent   = "";
    } else {
      document.getElementById("fcFrontLabel").textContent = "疾患名";
      document.getElementById("fcFrontMain").className    = "fc-main-text fc-jp-text";
      document.getElementById("fcFrontMain").innerHTML    = jpHtml;
      document.getElementById("fcFrontSub").textContent   = t.romaji || "";
    }
    document.getElementById("fcBackLabel").textContent  = "症状・徴候 / Symptoms";
    backMain.className   = "fc-main-text"; backMain.textContent = "";
    backMain.style.fontSize = "0.82rem"; backMain.style.fontWeight = "500";
    document.getElementById("fcBackRomaji").textContent = "";
    backDef.textContent  = sympText;
    backDef.style.borderTop = "none"; backDef.style.paddingTop = "0"; backDef.style.marginTop = "0";

  } else if (studyFocus === "treatment") {
    document.getElementById("fcFrontLabel").textContent = "Condition";
    document.getElementById("fcFrontMain").className    = "fc-main-text";
    document.getElementById("fcFrontMain").textContent  = t.en;
    document.getElementById("fcFrontSub").textContent   = t.cat || "";
    document.getElementById("fcBackLabel").textContent  = "Treatment / 治療";
    backMain.className   = "fc-main-text"; backMain.textContent = "";
    backMain.style.fontSize = "0.82rem"; backMain.style.fontWeight = "500";
    document.getElementById("fcBackRomaji").textContent = "";
    backDef.textContent  = TREATMENT_MAP[t.id] || "—";
    backDef.style.borderTop = "none"; backDef.style.paddingTop = "0"; backDef.style.marginTop = "0";
  }

  document.getElementById("fcSelfAssess").classList.remove("visible");
  document.getElementById("fcPrevBtn").disabled = studyIndex === 0;
  document.getElementById("fcNextBtn").disabled = studyIndex === total - 1;
  document.getElementById("fcScoreInfo").textContent = `Knew: ${fcKnew} · Forgot: ${fcForgot}`;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById("fcCard").classList.toggle("flipped", fcFlipped);
  document.getElementById("fcSelfAssess").classList.toggle("visible", fcFlipped);
}

function fcAssess(knew) {
  if (knew) fcKnew++; else fcForgot++;
  document.getElementById("fcScoreInfo").textContent = `Knew: ${fcKnew} · Forgot: ${fcForgot}`;
  if (studyIndex < studyTerms.length - 1) { studyIndex++; renderFlashcard(); }
  else showFCResults();
}

function fcPrev() { if (studyIndex > 0) { studyIndex--; renderFlashcard(); } }
function fcNext() {
  if (studyIndex < studyTerms.length - 1) { studyIndex++; renderFlashcard(); }
  else showFCResults();
}
function fcShuffle() {
  studyTerms = [...studyTerms].sort(() => Math.random() - 0.5);
  studyIndex = 0; fcKnew = 0; fcForgot = 0;
  renderFlashcard();
}

function showFCResults() {
  document.getElementById("fcContainer").classList.remove("active");
  const total   = studyTerms.length;
  showResults({ correct: fcKnew, wrong: fcForgot, skipped: total - fcKnew - fcForgot, total, mode: "flashcard" });
}

/* ── QUIZ ────────────────────────────────────────────────────────────────── */
function renderQuizQuestion() {
  if (studyIndex >= studyTerms.length) { showQzResults(); return; }

  const t      = studyTerms[studyIndex];
  const total  = studyTerms.length;
  const isEnJa = studyDir === "en-ja";

  qzAnsweredCurrent = false;
  document.getElementById("qzProgressText").textContent = `${studyIndex + 1} / ${total}`;
  document.getElementById("qzScoreDisplay").textContent = `Score: ${qzScore}/${qzAnswered}`;
  document.getElementById("qzProgressFill").style.width = `${(studyIndex / total) * 100}%`;
  document.getElementById("qzFeedback").textContent     = "";
  document.getElementById("qzFeedback").className       = "qz-feedback";
  document.getElementById("qzNextBtn").classList.remove("visible");

  if (studyFocus === "vocabulary") {
    document.getElementById("qzDirLabel").textContent = isEnJa ? "What is the Japanese?" : "What is the English?";
    if (isEnJa) {
      document.getElementById("qzQuestionText").textContent = t.en;
      document.getElementById("qzQuestionText").className   = "qz-question-text";
      const hint = t.def ? `"${t.def.slice(0, 80)}${t.def.length > 80 ? "…" : ""}"` : "";
      document.getElementById("qzQuestionSub").textContent  = hint;
    } else {
      const jpHtml = (t.kanji && t.reading && t.kanji !== t.reading)
        ? `<ruby>${t.kanji}<rt>${t.reading}</rt></ruby>` : (t.kanji || t.reading);
      document.getElementById("qzQuestionText").innerHTML  = jpHtml;
      document.getElementById("qzQuestionText").className  = "qz-question-text jp";
      document.getElementById("qzQuestionSub").textContent = t.romaji ? `(${t.romaji})` : "";
    }
    const pool    = getAllTerms().filter(x => x.id !== t.id && (x.kanji || x.reading));
    const wrongs  = [...pool].sort(() => Math.random() - 0.5).slice(0, 3);
    const choices = [t, ...wrongs].sort(() => Math.random() - 0.5);
    const ci      = choices.indexOf(t);
    document.getElementById("qzChoices").innerHTML = choices.map((c, i) => {
      let text = isEnJa ? (c.kanji || c.reading) : c.en;
      if (isEnJa && c.kanji && c.reading && c.kanji !== c.reading) text += ` (${c.reading})`;
      return `<button class="qz-choice" onclick="selectChoice(${i},${ci})">${text}</button>`;
    }).join("");

  } else if (studyFocus === "symptoms") {
    document.getElementById("qzDirLabel").textContent     = "Which symptoms match this condition?";
    document.getElementById("qzQuestionText").textContent = t.en;
    document.getElementById("qzQuestionText").className   = "qz-question-text";
    document.getElementById("qzQuestionSub").textContent  = t.cat;
    const correctText  = SYMPTOMS_MAP[t.id];
    const wrongKeys    = Object.keys(SYMPTOMS_MAP).map(Number).filter(k => k !== t.id)
                              .sort(() => Math.random() - 0.5).slice(0, 3);
    const allChoices   = [correctText, ...wrongKeys.map(k => SYMPTOMS_MAP[k])].sort(() => Math.random() - 0.5);
    const ci           = allChoices.indexOf(correctText);
    document.getElementById("qzChoices").innerHTML = allChoices.map((text, i) =>
      `<button class="qz-choice" style="font-size:0.79rem;line-height:1.45;" onclick="selectChoice(${i},${ci})">${text}</button>`
    ).join("");

  } else if (studyFocus === "treatment") {
    document.getElementById("qzDirLabel").textContent     = "How is this condition typically treated?";
    document.getElementById("qzQuestionText").textContent = t.en;
    document.getElementById("qzQuestionText").className   = "qz-question-text";
    document.getElementById("qzQuestionSub").textContent  = t.cat;
    const correctText  = TREATMENT_MAP[t.id];
    const wrongKeys    = Object.keys(TREATMENT_MAP).map(Number).filter(k => k !== t.id)
                              .sort(() => Math.random() - 0.5).slice(0, 3);
    const allChoices   = [correctText, ...wrongKeys.map(k => TREATMENT_MAP[k])].sort(() => Math.random() - 0.5);
    const ci           = allChoices.indexOf(correctText);
    document.getElementById("qzChoices").innerHTML = allChoices.map((text, i) =>
      `<button class="qz-choice" style="font-size:0.79rem;line-height:1.45;" onclick="selectChoice(${i},${ci})">${text}</button>`
    ).join("");
  }
}

function selectChoice(i, correctIdx) {
  if (qzAnsweredCurrent) return;
  qzAnsweredCurrent = true;
  qzAnswered++;
  const buttons = document.querySelectorAll(".qz-choice");
  buttons.forEach(b => b.disabled = true);
  const isCorrect = i === correctIdx;
  if (isCorrect) {
    qzScore++;
    buttons[i].classList.add("correct");
    document.getElementById("qzFeedback").textContent = "✓ Correct!";
    document.getElementById("qzFeedback").className   = "qz-feedback correct";
  } else {
    buttons[i].classList.add("wrong");
    buttons[correctIdx].classList.add("revealed");
    document.getElementById("qzFeedback").textContent = "✗ Wrong";
    document.getElementById("qzFeedback").className   = "qz-feedback wrong";
  }
  document.getElementById("qzScoreDisplay").textContent = `Score: ${qzScore}/${qzAnswered}`;
  document.getElementById("qzNextBtn").classList.add("visible");
}

function qzNext() { studyIndex++; renderQuizQuestion(); }

function showQzResults() {
  document.getElementById("qzContainer").classList.remove("active");
  const total = studyTerms.length;
  showResults({ correct: qzScore, wrong: total - qzScore, skipped: 0, total, mode: "quiz" });
}

/* ── RESULTS ─────────────────────────────────────────────────────────────── */
function showResults({ correct, wrong, skipped, total, mode }) {
  const assessed = correct + wrong;
  const pct      = assessed > 0 ? Math.round((correct / assessed) * 100) : 0;
  const icon     = assessed === 0 ? "📚" : pct >= 80 ? "🏆" : pct >= 50 ? "👍" : "📖";
  const title    = assessed === 0 ? "Session Complete!" :
                   pct >= 80 ? "Excellent!" : pct >= 50 ? "Good effort!" : "Keep studying!";
  document.getElementById("studyResultsIcon").textContent  = icon;
  document.getElementById("studyResultsTitle").textContent = title;
  document.getElementById("studyResultsScore").textContent = assessed > 0 ? `${pct}%` : `${total} cards`;
  document.getElementById("studyResultsSub").textContent   = mode === "flashcard"
    ? `Knew ${correct} · Forgot ${wrong} · Skipped ${skipped} (out of ${total} cards)`
    : `${correct} correct out of ${total} questions`;
  document.getElementById("studyResults").classList.add("active");
  document.getElementById("studyHeader").querySelector("h2").textContent = "Results";
}

function restartStudy() { showStudySetup(); }

/* ── INIT ───────────────────────────────────────────────────────────────────── */
render();
</script>
